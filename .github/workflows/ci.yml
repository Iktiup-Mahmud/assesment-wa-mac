name: NovaPay CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      account-service: ${{ steps.filter.outputs.account-service }}
      transaction-service: ${{ steps.filter.outputs.transaction-service }}
      ledger-service: ${{ steps.filter.outputs.ledger-service }}
      fx-service: ${{ steps.filter.outputs.fx-service }}
      payroll-service: ${{ steps.filter.outputs.payroll-service }}
      admin-service: ${{ steps.filter.outputs.admin-service }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            account-service:
              - 'services/account-service/**'
            transaction-service:
              - 'services/transaction-service/**'
            ledger-service:
              - 'services/ledger-service/**'
            fx-service:
              - 'services/fx-service/**'
            payroll-service:
              - 'services/payroll-service/**'
            admin-service:
              - 'services/admin-service/**'

  test-and-build:
    needs: detect-changes
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - account-service
          - transaction-service
          - ledger-service
          - fx-service
          - payroll-service
          - admin-service
    steps:
      - uses: actions/checkout@v4

      - name: Resolve changed flag
        id: changed
        shell: bash
        run: |
          key="${{ matrix.service }}"
          value="${{ needs.detect-changes.outputs.account-service }}"
          case "$key" in
            account-service) value="${{ needs.detect-changes.outputs.account-service }}" ;;
            transaction-service) value="${{ needs.detect-changes.outputs.transaction-service }}" ;;
            ledger-service) value="${{ needs.detect-changes.outputs.ledger-service }}" ;;
            fx-service) value="${{ needs.detect-changes.outputs.fx-service }}" ;;
            payroll-service) value="${{ needs.detect-changes.outputs.payroll-service }}" ;;
            admin-service) value="${{ needs.detect-changes.outputs.admin-service }}" ;;
          esac
          echo "changed=$value" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        if: steps.changed.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        if: steps.changed.outputs.changed == 'true'
        working-directory: services/${{ matrix.service }}
        run: npm ci

      - name: Run tests
        if: steps.changed.outputs.changed == 'true'
        working-directory: services/${{ matrix.service }}
        run: npm test -- --coverage

      - name: Build app
        if: steps.changed.outputs.changed == 'true'
        working-directory: services/${{ matrix.service }}
        run: npm run build

      - name: Get version
        if: steps.changed.outputs.changed == 'true'
        id: version
        working-directory: services/${{ matrix.service }}
        run: echo "version=$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        if: steps.changed.outputs.changed == 'true'
        run: docker build -t ${{ matrix.service }}:${{ steps.version.outputs.version }} services/${{ matrix.service }}

      - name: Push Docker image
        if: steps.changed.outputs.changed == 'true' && github.ref == 'refs/heads/main'
        run: |
          docker tag ${{ matrix.service }}:${{ steps.version.outputs.version }} ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ steps.version.outputs.version }}
          docker push ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ steps.version.outputs.version }}
